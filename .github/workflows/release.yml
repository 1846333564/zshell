name: 发布 zShell

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本，例如 0.0.1'
        required: true
        default: '0.0.1'

permissions:
  contents: write

jobs:
  build-release:
    name: 构建并发布 Windows 可执行文件
    runs-on: windows-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 确定版本号
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "版本号格式无效: $version"
          }
          Set-Content -LiteralPath VERSION -Value $version -NoNewline
          $releaseTitle = "zShell $version"
          $releaseNamesPath = ".github\release-names.json"
          if (Test-Path -LiteralPath $releaseNamesPath) {
            $releaseNames = Get-Content -LiteralPath $releaseNamesPath -Raw | ConvertFrom-Json -AsHashtable
            if ($releaseNames.ContainsKey($version) -and -not [string]::IsNullOrWhiteSpace([string]$releaseNames[$version])) {
              $releaseTitle = [string]$releaseNames[$version]
            }
          }
          "ZSHELL_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZSHELL_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZSHELL_RELEASE_TITLE=$releaseTitle" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 构建 release 可执行文件
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build-windows.ps1

      - name: 生成 SHA256 校验文件
        shell: pwsh
        run: |
          $exe = "release\zshell.$env:ZSHELL_VERSION.exe"
          if (!(Test-Path -LiteralPath $exe)) {
            throw "未找到构建产物: $exe"
          }
          $hash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  zshell.$env:ZSHELL_VERSION.exe" | Set-Content -LiteralPath "$exe.sha256" -NoNewline

      - name: 准备发布说明
        shell: pwsh
        run: |
          @(
            "$env:ZSHELL_RELEASE_TITLE",
            "",
            "- Windows 免安装可执行文件",
            "- 下载 zshell.$env:ZSHELL_VERSION.exe 后可直接运行"
          ) | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding utf8

      - name: 创建或更新 GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = "release\zshell.$env:ZSHELL_VERSION.exe"
          $sha = "$exe.sha256"
          gh release view $env:ZSHELL_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:ZSHELL_TAG --title "$env:ZSHELL_RELEASE_TITLE" --notes-file RELEASE_NOTES.md --latest
            gh release upload $env:ZSHELL_TAG $exe $sha --clobber
          } else {
            gh release create $env:ZSHELL_TAG $exe $sha --title "$env:ZSHELL_RELEASE_TITLE" --notes-file RELEASE_NOTES.md --latest
          }
